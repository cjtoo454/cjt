LunarLander-v3:
  n_envs: 16
  n_timesteps: !!float 1e6
  policy: MlpPolicy
  n_steps: 1024
  batch_size: 64
  gae_lambda: 0.98
  gamma: 0.999
  n_epochs: 4
  ent_coef: 0.01
  learning_rate: 0.0003
  clip_range: 0.2
  vf_coef: 0.5
  max_grad_norm: 0.5
  normalize: false
  policy_kwargs: "dict(net_arch=dict(pi=[64, 64], vf=[64, 64]), activation_fn=nn.Tanh, ortho_init=True)"
