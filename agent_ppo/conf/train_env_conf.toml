algo = "ppo"
env = "LunarLander-v3"
organization = "sb3"
log_folder = "logs"
hyperparams_file = "agent_ppo/conf/ppo_lunarlander.yml"

[reward]
scale = 1.0
bias = 0.0
success_threshold = 200.0
distance_weight = -220.0
velocity_weight = -100.0
angle_weight = -100.0
leg_contact_bonus = 10.0
main_engine_cost = 0.15
side_engine_cost = 0.005
crash = -100.0
landing = 70.0

[model]
policy = "MlpPolicy"
observation_dim = 8
action_num = 4
actor_hidden_layers = [128, 128]
critic_hidden_layers = [128, 128]
activation_fn = "Tanh"
ortho_init = true

[train]
n_timesteps = 3000000
n_envs = 16
n_steps = 2048
batch_size = 128
n_epochs = 6
learning_rate = 0.00015
gamma = 0.999
gae_lambda = 0.98
clip_range = 0.15
ent_coef = 0.003
vf_coef = 0.7
max_grad_norm = 0.5
normalize = false
norm_obs = false
norm_reward = false
train_seed = 0
eval_seed = 10000
eval_freq_steps = 25000
n_eval_episodes = 20

[real]
obs_noise_std = 0.10
action_delay_steps = 3
default_action = 0
noise_seed_offset = 2026
gust_probability = 0.06
gust_force_x_std = 1.0
gust_force_y_std = 0.3
gust_duration_min = 4
gust_duration_max = 12

[real_score]
fuel_weight = 0.20
precision_weight = 0.45
stability_weight = 0.35
side_engine_fuel_ratio = 0.25
precision_max_error = 1.0
stability_max_error = 1.2
stability_angle_weight = 1.2
stability_angular_vel_weight = 0.6
stability_horizontal_vel_weight = 0.7
completion_x_threshold = 0.20
completion_angle_threshold = 0.30
